<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicebank Central Network Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Segoe+UI&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
 <body>

    <header class="galaxy-header">
        <h1 class="title-main">Voicebank Central</h1>
        <p class="title-sub">Click on a company of your choice</p>
    </header>

    <div class="galaxy-viewport">
        
        <div class="galaxy-overlay"></div>
        
        <main class="universe-canvas">
            
            <section id="cfm" class="galaxy-container" style="top: 1000px; left: 1000px;">
                <button class="center-hub">CFM</button>
            </section>

            <section id="ahs" class="galaxy-container" style="top: 1350px; left: 600px;">
                <button class="center-hub">AHS</button>
            </section>

            <section id="kamitsubaki" class="galaxy-container" style="top: 670px; left: 1400px;">
                <button class="center-hub">KAMITSUBAKI</button>
            </section>

            <section id="FrstPlace" class="galaxy-container" style="top: 1350px; left: 1400px;">
                <button class="center-hub">1stPLACE</button>
            </section>
            
        </main>

        <nav class="galaxy-nav">
            <a href="#home" class="nav-btn">Reset View</a>
            <a href="#cfm" class="nav-btn">Crypton Future Media</a>
            <a href="#ahs" class="nav-btn">AHS Co., Ltd.</a>
            <a href="#kamitsubaki" class="nav-btn">Kamitsubaki</a>
            <a href="#FrstPlace" class="nav-btn">1stPlace</a>
        </nav>

    </div>


    <div id="portrait-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close-btn">&times;</button>
            <div class="modal-image-frame"></div>
        </div>
    </div>

    <script src="script.js"></script>
 </body>
</html>
